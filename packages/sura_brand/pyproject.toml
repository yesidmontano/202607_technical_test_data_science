[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sura-brand"
version = "0.1.0"
description = "Manual de marca para visualizaciones de datos – Grupo SURA"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Propietario – Uso interno Grupo SURA" }
authors = [
  { name = "Equipo Data Science | Grupo SURA" }
]
keywords = ["sura", "brand", "visualization", "matplotlib", "seaborn", "eda"]

dependencies = [
  "matplotlib>=3.7.0",
  "seaborn>=0.12.0",
  "numpy>=1.24.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "pandas>=2.0.0",
  "jupyter>=1.0.0",
  "ipykernel>=6.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["sura_brand*"]

[tool.setuptools.package-data]
sura_brand = ["assets/*.png", "assets/*.jpg", "assets/*.svg"]
